name: Deploy to Server

on:
  push:
    branches:
      - main 
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            cd /var/www/crowdview

            # pull latest changes
            git pull

            # run DB migrations (safe to re-run — ALTER uses IF NOT EXISTS)
            cd /var/www/crowdview/server
            DB_HOST=$(grep '^DB_HOST=' .env | cut -d= -f2)
            DB_PORT=$(grep '^DB_PORT=' .env | cut -d= -f2)
            DB_USER=$(grep '^DB_USER=' .env | cut -d= -f2)
            DB_PASSWORD=$(grep '^DB_PASSWORD=' .env | cut -d= -f2)
            mysql -h "$DB_HOST" -P "${DB_PORT:-3306}" -u "$DB_USER" -p"$DB_PASSWORD" < db/alter.sql
            echo "DB migration complete"
            cd /var/www/crowdview

            # client
            cd client

            # install dependencies
            npm install

            # build project
            npm run build

            # check if pm2 process exists
            if pm2 describe crowdview > /dev/null 2>&1; then
              echo "PM2 process exists. Restarting..."
              pm2 restart crowdview
            else
              echo "PM2 process not found. Starting new process..."
              pm2 start npm --name crowdview -- run preview
            fi

            # server
            cd ../server

            # install dependencies
            npm install

             # check if pm2 process exists
            if pm2 describe crowdview-api > /dev/null 2>&1; then
              echo "PM2 process exists. Restarting..."
              pm2 restart crowdview-api
            else
              echo "PM2 process not found. Starting new process..."
              pm2 start npm --name crowdview-api -- start
            fi

            # save pm2 state (so it restarts on reboot)
            pm2 save
          EOF
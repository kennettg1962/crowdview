name: Deploy to Server

on:
  push:
    branches:
      - main 
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            cd /var/www/crowdview

            # pull latest changes
            git pull

            # install server deps first (needed for DB migration)
            cd /var/www/crowdview/server
            npm install

            # run DB migrations via Node (safe to re-run — ALTER uses IF NOT EXISTS)
            npm run alter

            # client
            cd /var/www/crowdview/client

            # install dependencies
            npm install

            # build project
            npm run build

            # check if pm2 process exists
            if pm2 describe crowdview > /dev/null 2>&1; then
              echo "PM2 process exists. Restarting..."
              pm2 restart crowdview
            else
              echo "PM2 process not found. Starting new process..."
              pm2 start npm --name crowdview -- run preview
            fi

            # server
            cd ../server

             # check if pm2 process exists
            if pm2 describe crowdview-api > /dev/null 2>&1; then
              echo "PM2 process exists. Restarting..."
              pm2 restart crowdview-api
            else
              echo "PM2 process not found. Starting new process..."
              pm2 start npm --name crowdview-api -- start
            fi

            # save pm2 state (so it restarts on reboot)
            pm2 save

            # update crowdviewtv.com marketing site
            mkdir -p /var/www/crowdviewtv
            cp -r /var/www/crowdview/marketing/. /var/www/crowdviewtv/
          EOF